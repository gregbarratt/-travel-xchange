<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 520" role="img" aria-label="Plane flying over a glowing globe">
  <defs>
    <radialGradient id="sunGlow" cx="46%" cy="72%" r="44%">
      <stop offset="0%" stop-color="#fff7c7"/>
      <stop offset="16%" stop-color="#ffb85a"/>
      <stop offset="39%" stop-color="#ff4972" stop-opacity=".78"/>
      <stop offset="70%" stop-color="#1c7bff" stop-opacity=".22"/>
      <stop offset="100%" stop-color="#061b4f" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="skyGlow" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#062050"/>
      <stop offset="48%" stop-color="#073b80"/>
      <stop offset="100%" stop-color="#03183d"/>
    </linearGradient>
    <linearGradient id="earth" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#1f79df"/>
      <stop offset="48%" stop-color="#0a317a"/>
      <stop offset="100%" stop-color="#020a22"/>
    </linearGradient>
    <linearGradient id="pinkTrail" x1="0" x2="1">
      <stop offset="0%" stop-color="#46d9ff" stop-opacity="0"/>
      <stop offset="42%" stop-color="#46d9ff"/>
      <stop offset="72%" stop-color="#f52968"/>
      <stop offset="100%" stop-color="#ff7a2f" stop-opacity=".9"/>
    </linearGradient>
    <linearGradient id="blueTrail" x1="0" x2="1">
      <stop offset="0%" stop-color="#76f0ff" stop-opacity="0"/>
      <stop offset="44%" stop-color="#69eaff"/>
      <stop offset="100%" stop-color="#ffffff"/>
    </linearGradient>
    <filter id="softGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="420" height="520" fill="url(#skyGlow)"/>
  <rect width="420" height="520" fill="url(#sunGlow)"/>

  <g fill="none" filter="url(#softGlow)" stroke-linecap="round">
    <path d="M-38 488 C89 394 168 314 446 158" stroke="url(#pinkTrail)" stroke-width="12" opacity=".92"/>
    <path d="M-22 456 C97 354 165 276 424 86" stroke="url(#blueTrail)" stroke-width="7" opacity=".92"/>
    <path d="M-42 521 C75 408 153 336 444 244" stroke="#ff7a2f" stroke-width="5" opacity=".68"/>
    <path d="M-44 430 C88 366 172 281 440 194" stroke="#f52968" stroke-width="4" opacity=".7"/>
    <path d="M-50 505 C98 412 193 310 452 120" stroke="#ffffff" stroke-width="2.5" opacity=".5"/>
  </g>

  <g opacity=".72">
    <path d="M-40 406 C80 323 220 270 452 250" fill="none" stroke="#ffffff" stroke-width="1.2" opacity=".22"/>
    <path d="M-52 452 C83 353 223 302 474 286" fill="none" stroke="#ffffff" stroke-width="1.2" opacity=".18"/>
    <path d="M-36 358 C86 308 232 278 454 276" fill="none" stroke="#ffffff" stroke-width=".9" opacity=".14"/>
  </g>

  <g transform="translate(0 318)">
    <ellipse cx="218" cy="210" rx="282" ry="132" fill="url(#earth)"/>
    <ellipse cx="218" cy="78" rx="276" ry="86" fill="none" stroke="#8be8ff" stroke-width="3" opacity=".82"/>
    <ellipse cx="218" cy="78" rx="276" ry="86" fill="none" stroke="#ffffff" stroke-width="1" opacity=".6"/>
    <path d="M-24 115 C82 72 161 84 252 106 C332 125 405 119 464 76" fill="none" stroke="#76f0ff" stroke-width="1.5" opacity=".4"/>
    <path d="M38 146 C101 109 181 124 248 145 C314 166 379 166 420 137" fill="none" stroke="#ffffff" stroke-width="1" opacity=".2"/>
  </g>

  <g transform="translate(178 260) rotate(42) scale(5.2)">
    <path d="M11.4 1.7 C10.6 1.7 10 2.35 10 3.15 L10 8.35 L2.55 13.05 C2.2 13.25 2 13.65 2 14.05 L2 15.9 L10 13.55 L10 18.55 L7.75 20.35 L7.75 21.95 L11.4 20.95 L15.05 21.95 L15.05 20.35 L12.8 18.55 L12.8 13.55 L20.8 15.9 L20.8 14.05 C20.8 13.65 20.6 13.25 20.25 13.05 L12.8 8.35 L12.8 3.15 C12.8 2.35 12.2 1.7 11.4 1.7 Z" fill="#061b4f"/>
    <path d="M11.4 2.5 L11.4 19.9" fill="none" stroke="#ffffff" stroke-width=".45" opacity=".72" stroke-linecap="round"/>
    <path d="M3.4 14.2 L10.7 11.95 M12.1 11.95 L19.4 14.2" fill="none" stroke="#ffffff" stroke-width=".35" opacity=".5" stroke-linecap="round"/>
  </g>

  <g filter="url(#softGlow)">
    <circle cx="177" cy="375" r="9" fill="#fff7c7"/>
    <circle cx="177" cy="375" r="25" fill="#ff7a2f" opacity=".42"/>
    <circle cx="177" cy="375" r="51" fill="#f52968" opacity=".18"/>
  </g>
</svg>
